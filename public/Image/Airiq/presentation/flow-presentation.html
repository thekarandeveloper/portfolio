<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR iQ · Product Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#F0F4FF;--stage:#EBF0FF;--card:rgba(255,255,255,.78);--chip:rgba(255,255,255,.88);
  --td:#1A1F3C;--tm:#3D4566;--tmu:#6B7499;--tf:#8A94B8;--tl:#A0AACC;
  --sf:0 32px 80px rgba(100,120,200,.20),0 6px 24px rgba(100,120,200,.12),0 0 0 1px rgba(255,255,255,.92);
  --sc:0 6px 24px rgba(100,120,200,.12),0 0 0 1px rgba(255,255,255,.82);
  --sh:0 3px 12px rgba(100,120,200,.12),0 0 0 1px rgba(255,255,255,.75);
  --acc:#7B8FFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',-apple-system,sans-serif;color:var(--td);overflow-x:hidden}

/* ── INTRO ── */
.intro{text-align:center;padding:44px 24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.ie{font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);opacity:0;transform:translateY(16px);transition:opacity .4s,transform .4s}
.it{font-size:38px;line-height:1.1;display:flex;flex-direction:column;opacity:0;transform:translateY(14px);transition:opacity .5s .1s,transform .5s .1s}
.is{font-size:13.5px;line-height:1.65;color:var(--tf);max-width:380px;opacity:0;transform:translateY(10px);transition:opacity .4s .2s,transform .4s .2s}
.ie.in,.it.in,.is.in{opacity:1;transform:translateY(0)}
.t1{font-weight:700;color:var(--td)}.t2{font-weight:300;color:var(--tmu)}
.hint{font-size:10px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:#7B8FFF;background:rgba(123,143,255,.10);border:1px solid rgba(123,143,255,.22);border-radius:999px;padding:6px 16px;opacity:0;transition:opacity .4s .3s;animation:bob 2s ease-in-out infinite}
.hint.in{opacity:1}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── STAGE ── */
.stage-wrap{background:var(--stage);position:relative;overflow:hidden}
.dot-bg{position:absolute;inset:0;background-image:radial-gradient(circle,#C5CEF0 1px,transparent 1px);background-size:28px 28px;opacity:.33}
.wash{position:absolute;inset:0;transition:background .8s ease;pointer-events:none}
.stage-inner{position:relative;z-index:1}

/* ── 2-COL GRID ── */
/* Left: orbit fixed 152px. Right: everything else fills remaining */
.sgrid{display:grid;grid-template-columns:152px 1fr;gap:28px;padding:28px 44px 22px;align-items:center;position:relative}
.conn-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;overflow:visible}

/* ── ORBIT COLUMN ── */
.col-orb{display:flex;flex-direction:column;align-items:center;gap:20px;align-self:center}
.orb-wrap{position:relative;width:140px;height:140px;flex-shrink:0}
.orb-svg{position:absolute;inset:0;width:140px;height:140px;overflow:visible}
.or{transform-box:fill-box;transform-origin:center;animation:sp18 18s linear infinite}
@keyframes sp18{to{transform:rotate(360deg)}}
.orb-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:96px;height:96px;border-radius:50%;background:white;box-shadow:var(--sc);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;padding:10px;transition:opacity .15s}
.orb-inner.fd{opacity:0}
.oc{font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase}
.on{font-size:11px;font-weight:600;color:var(--td);line-height:1.25}
.mtl{display:flex;flex-direction:column;gap:7px;align-items:center}
.tlr{position:relative;cursor:pointer;display:flex;align-items:center}
.tld{width:9px;height:9px;border-radius:50%;background:#D0D8F0;transition:transform .15s,background .3s,box-shadow .3s}
.tlr:hover .tld{transform:scale(1.35)}
.tlt{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:white;box-shadow:var(--sh);border-radius:999px;padding:2px 8px;font-size:10.5px;color:var(--td);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}
.tlr:hover .tlt{opacity:1}

/* ── RIGHT COLUMN — laptop + panel stacked ── */
.col-right{display:flex;flex-direction:column;gap:14px;min-width:0}

/* ── LAPTOP ── */
.laptop-wrap{width:100%}
.lid{background:#1C1C22;border-radius:12px 12px 0 0;padding:7px 7px 0 7px;box-shadow:var(--sf)}
.bezel{background:#0D0D10;border-radius:8px 8px 0 0;overflow:hidden}
.chrome{height:34px;background:#1E1E24;border-radius:8px 8px 0 0;display:flex;align-items:center;padding:0 10px}
.cdots{display:flex;gap:5px;align-items:center;flex-shrink:0}
.cd{width:10px;height:10px;border-radius:50%}.cd.r{background:#FF5F57}.cd.y{background:#FEBC2E}.cd.g{background:#28C840}
.upill{margin:0 auto;background:#111116;height:22px;width:max(180px,40%);border-radius:999px;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 8px;flex-shrink:0;overflow:hidden}
.utxt{font-size:10.5px;color:#8A94B8;transition:opacity .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.utxt.fd{opacity:0}
.cdrow{margin-left:auto;display:flex;gap:3px;align-items:center;flex-shrink:0}
.cdot{width:4px;height:4px;border-radius:50%;transition:background .3s}
.pgwrap{height:2px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.pgfill{position:absolute;left:0;top:0;bottom:0;width:0%}
/* Screen area */
.sa{height:380px;position:relative;overflow:hidden;background:#111116}
.simg{position:absolute;top:0;left:0;width:100%;opacity:0;display:block;transform:translateY(0);will-change:transform,opacity}
.simg.on{opacity:1}
.sloader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111116;z-index:10}
.sloader.off{display:none}
.spsvg{width:28px;height:28px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Chips inside screen area */
.chip{position:absolute;background:rgba(255,255,255,.90);backdrop-filter:blur(10px) saturate(1.4);-webkit-backdrop-filter:blur(10px) saturate(1.4);border-radius:9px;padding:7px 10px;box-shadow:var(--sh);max-width:156px;opacity:0;transform:scale(.86);transition:opacity .28s cubic-bezier(.34,1.56,.64,1),transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:20}
.chip.vis{opacity:1;transform:scale(1)}
.chtop{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.chd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chlbl{font-size:9px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--td)}
.chcap{font-size:10.5px;color:var(--tmu);line-height:1.35}
/* chip positions inside .sa */
#ctl{top:8px;left:8px}
#ctr{top:8px;right:8px}
#cbl{bottom:8px;left:8px}
#cbr{bottom:8px;right:8px}
/* Bottom edge fade over chips */
.sa-fade{position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,transparent,#111116);pointer-events:none;z-index:15}

.glass-ref{width:88%;height:44px;margin:0 auto;background:linear-gradient(to bottom,rgba(200,210,240,.16),transparent);border-radius:0 0 8px 8px;filter:blur(2px)}
.lbase{height:14px;background:linear-gradient(to bottom,#C8CDD8,#A8ADB8);border-radius:0 0 4px 4px;width:83%;margin:0 auto;box-shadow:0 3px 16px rgba(0,0,0,.14)}

/* ── PANEL CARD (below laptop in right column) ── */
.panel-card{background:var(--card);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(255,255,255,.82);border-radius:14px;box-shadow:var(--sc);padding:18px 20px;min-height:130px}
.pi{transition:opacity .15s,transform .15s}
.pi.exit{opacity:0;transform:translateX(-6px)}
.pi.e0{opacity:0;transform:translateX(6px);transition:none}
.pi.ein{opacity:1;transform:translateX(0);transition:opacity .2s,transform .2s}
/* Panel layout: single column stacked */
.panel-body{display:flex;flex-direction:column;gap:14px}
.panel-left{}
.ptag{display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.pname{font-size:17px;font-weight:600;color:var(--td);margin-bottom:10px;line-height:1.25}
.pins{display:flex;flex-direction:column;gap:7px}
.pin{display:flex;gap:7px;align-items:flex-start}
.pic{flex-shrink:0;margin-top:2px}
.pit{font-size:12.5px;color:var(--tm);line-height:1.55}
.panel-right{padding-top:12px;border-top:1px solid rgba(0,0,0,.07)}
.pql{font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--tl);margin-bottom:6px}
.pqt{font-size:13px;font-style:italic;color:var(--td);line-height:1.58;border-left:3px solid var(--acc);padding-left:10px}

/* ── FILMSTRIP ── */
.fstrip{background:rgba(255,255,255,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.80);border-bottom:1px solid rgba(200,210,240,.38);padding:12px 44px;display:flex;gap:6px;align-items:stretch}
.fsseg{flex:1;display:flex;flex-direction:column;gap:5px;cursor:pointer;min-width:0}
.fstr{height:3.5px;background:#D8DFFF;border-radius:999px;position:relative;overflow:hidden}
.fsfl{position:absolute;left:0;top:0;bottom:0;width:0%;border-radius:999px}
.fslbl{font-size:9px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:#8A94B8;text-align:center;transition:color .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── REPLAY ── */
.rzone{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 44px;opacity:0;transition:opacity .4s;pointer-events:none;background:rgba(240,244,255,.9)}
.rzone.vis{opacity:1;pointer-events:auto}
.rbtn{width:64px;height:64px;border-radius:50%;background:white;border:2px solid #4ECBA0;box-shadow:var(--sc);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
.rrsvg{width:64px;height:64px;position:absolute;top:0;left:0;transform:rotate(-90deg)}
.rt,.rf{fill:none}
.rtxt{display:flex;flex-direction:column}
.rm{font-size:13px;font-weight:600;color:var(--td)}.rs{font-size:11px;color:var(--tf)}

/* MOBILE */
@media(max-width:640px){
  .it{font-size:28px}
  .sgrid{grid-template-columns:1fr;padding:20px 16px 14px}
  .col-orb{flex-direction:row;justify-content:center}
  .mtl{flex-direction:row}
  .chip{display:none!important}
  .panel-body{flex-direction:column}
  .fstrip{padding:10px 14px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>

<!-- INTRO -->
<section class="intro" id="intro">
  <span class="ie" id="ie">Complete Booking Flow</span>
  <h1 class="it" id="it"><span class="t1">Designed for agents</span><span class="t2">who move fast.</span></h1>
  <p class="is" id="is">Seven screens. One uninterrupted flow. Every decision annotated.</p>
  <div class="hint" id="hint">↓ Click any step · or watch it unfold</div>
</section>

<!-- STAGE -->
<div class="stage-wrap" id="stageWrap">
  <div class="dot-bg"></div>
  <div class="wash" id="wash"></div>
  <div class="stage-inner">
    <div class="sgrid" id="sgrid">
      <svg class="conn-svg" id="connSvg"></svg>

      <!-- LEFT: ORBIT -->
      <div class="col-orb">
        <div class="orb-wrap" id="orbWrap">
          <svg class="orb-svg" viewBox="0 0 140 140" width="140" height="140">
            <circle cx="70" cy="70" r="68" fill="rgba(235,240,255,.85)"/>
            <circle class="or" id="orEl" cx="70" cy="70" r="64" fill="none" stroke-width="1.5" stroke-dasharray="6 8"/>
            <circle cx="70" cy="70" r="56" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="2.5" transform="rotate(-90 70 70)"/>
            <circle id="arcEl" cx="70" cy="70" r="56" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="50.3 352" transform="rotate(-90 70 70)"/>
          </svg>
          <div class="orb-inner" id="orbInner">
            <span class="oc" id="oc">01 / 07</span>
            <span class="on" id="on">Login &amp; Auth</span>
          </div>
        </div>
        <div class="mtl" id="mtl"></div>
      </div>

      <!-- RIGHT: laptop + panel stacked -->
      <div class="col-right">
        <!-- Laptop -->
        <div class="laptop-wrap">
          <div class="lid">
            <div class="bezel">
              <div class="chrome">
                <div class="cdots"><div class="cd r"></div><div class="cd y"></div><div class="cd g"></div></div>
                <div class="upill">
                  <svg width="9" height="11" viewBox="0 0 10 12" fill="none"><rect x="1" y="5" width="8" height="7" rx="1.5" stroke="#6B7499" stroke-width="1.2"/><path d="M3 5V3.5a2 2 0 014 0V5" stroke="#6B7499" stroke-width="1.2" stroke-linecap="round"/></svg>
                  <span class="utxt" id="utxt">airiq.com/login</span>
                </div>
                <div class="cdrow" id="cdrow"></div>
              </div>
              <div class="pgwrap"><div class="pgfill" id="pgf"></div></div>
              <div class="sa" id="sa">
                <div class="sloader" id="sldr">
                  <svg class="spsvg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="12" fill="none" stroke="#7B8FFF" stroke-width="2.5" stroke-dasharray="28 50" stroke-linecap="round"/></svg>
                </div>
                <!-- Chips live inside screen area — injected by JS -->
                <div class="chip" id="ctl"></div>
                <div class="chip" id="ctr"></div>
                <div class="chip" id="cbl"></div>
                <div class="chip" id="cbr"></div>
                <div class="sa-fade"></div>
              </div>
            </div>
          </div>
          <div class="glass-ref"></div>
          <div class="lbase"></div>
        </div>

        <!-- Panel card below laptop -->
        <div class="panel-card">
          <div class="pi" id="pi"></div>
        </div>
      </div>
    </div>

    <!-- Filmstrip -->
    <div class="fstrip" id="fstrip"></div>

    <!-- Replay -->
    <div class="rzone" id="rzone">
      <button class="rbtn" id="rbtn" aria-label="Replay flow">
        <svg class="rrsvg" viewBox="0 0 64 64">
          <circle class="rt" cx="32" cy="32" r="26" stroke="#EBF0FF" stroke-width="3.5"/>
          <circle class="rf" id="rf" cx="32" cy="32" r="26" stroke="#4ECBA0" stroke-width="3.5" stroke-dasharray="163.4 163.4" stroke-dashoffset="163.4" stroke-linecap="round"/>
        </svg>
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" style="position:relative;z-index:1">
          <path d="M16.5 10a6.5 6.5 0 11-2-4.65" stroke="#4ECBA0" stroke-width="2" stroke-linecap="round"/>
          <path d="M14.5 5.5V2.5m0 3H11.5" stroke="#4ECBA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="rtxt">
        <span class="rm">Replay the flow</span>
        <span class="rs">or click any step above</span>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════
// DATA
// ══════════════════════════
const ACC=['#7B8FFF','#5BA4FF','#3ECFCF','#6C8FFF','#FF8F6C','#9B7FFF','#4ECBA0'];
const URLS=['airiq.com/login','airiq.com/home','airiq.com/search','airiq.com/search','airiq.com/booking/details','airiq.com/booking/review','airiq.com/booking/confirmed'];
const LBLS=['Login','Home','Results','Details','Passengers','Review','Confirmed'];
const DURS=[4500,4500,4500,4500,7500,7500,4500];
const CIRC56=2*Math.PI*56; // circumference for r=56

const IC={
  shield:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  users:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`,
  layout:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`,
  clock:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  filter:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
  eye:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  layers:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  pkg:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
  ucheck:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>`,
  map:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`,
  csq:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,
  card:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
  share:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
  toggle:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="22" height="14" rx="7"/><circle cx="8" cy="12" r="3"/></svg>`
};

const SD=[
  {img:'./login.png',ol:'Login & Auth',nm:'Agent Authentication',
   ins:[{ic:'shield',tx:'Split-screen separates brand proof from the login task — reducing cognitive load at the highest anxiety moment.'},{ic:'users',tx:'Role-specific labelling — Agent / Distributor Login — immediately frames who this space is for.'}],
   qt:'Is this platform actually built for me, or will I hit consumer UX the moment I log in?',
   ch:[{lbl:'Trust Layer',cap:'Hero imagery first'},{lbl:'Social Proof',cap:'75K+ agents upfront'},{lbl:'Role Context',cap:'Labelled for B2B'},{lbl:'Zero Friction',cap:'No captcha wall'}]},
  {img:'./homepage.png',ol:'Dashboard',nm:'The Command Centre',
   ins:[{ic:'layout',tx:'Search bar occupies the F-pattern primary zone. Fare type checkboxes (SME, NDC, SOTO) exposed before search — a B2B-first decision.'},{ic:'clock',tx:'Recent Searches and Upcoming Bookings eliminate re-entry friction for agents managing parallel bookings.'}],
   qt:'I have a client waiting. I need to find that Delhi–London flight I searched yesterday — fast.',

// ══════════════════════════
// STATE
// ══════════════════════════
let cur=1,pgRaf=null,scrRaf=null,hovering=false,rcRaf=null,loaded=false;
const sa=document.getElementById('sa');
const connSvg=document.getElementById('connSvg');
const wash=document.getElementById('wash');
const orEl=document.getElementById('orEl');
const arcEl=document.getElementById('arcEl');
const orbInner=document.getElementById('orbInner');
const oc=document.getElementById('oc');
const on=document.getElementById('on');
const mtl=document.getElementById('mtl');
const utxt=document.getElementById('utxt');
const cdrow=document.getElementById('cdrow');
const pgf=document.getElementById('pgf');
const pi=document.getElementById('pi');
const fstrip=document.getElementById('fstrip');
const rzone=document.getElementById('rzone');
const rbtn=document.getElementById('rbtn');
const rf=document.getElementById('rf');
const ctl=document.getElementById('ctl');
const ctr=document.getElementById('ctr');
const cbl=document.getElementById('cbl');
const cbr=document.getElementById('cbr');
const CHIPS=[ctl,ctr,cbl,cbr];

// ══════════════════════════
// INIT
// ══════════════════════════
function init(){
  introIn();
  buildTl();buildCd();buildFs();
  preload();
  document.getElementById('stageWrap').addEventListener('mouseenter',()=>{hovering=true;});
  document.getElementById('stageWrap').addEventListener('mouseleave',()=>{hovering=false;});
  rbtn.addEventListener('click',replay);
  window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<7)go(cur+1);else if(e.key==='ArrowLeft'&&cur>1)go(cur-1);});
  window.addEventListener('resize',drawConn);
}

function introIn(){
  setTimeout(()=>document.getElementById('ie').classList.add('in'),80);
  setTimeout(()=>document.getElementById('it').classList.add('in'),160);
  setTimeout(()=>document.getElementById('is').classList.add('in'),240);
  setTimeout(()=>document.getElementById('hint').classList.add('in'),700);
}

function buildTl(){
  mtl.innerHTML='';
  SD.forEach((_,i)=>{
    const r=document.createElement('div');r.className='tlr';
    r.setAttribute('role','button');r.setAttribute('tabindex','0');
    r.setAttribute('aria-label','Step '+(i+1)+': '+LBLS[i]);
    const d=document.createElement('div');d.className='tld';d.id='tld'+(i+1);
    const t=document.createElement('div');t.className='tlt';t.textContent=String(i+1).padStart(2,'0')+' '+LBLS[i];
    r.appendChild(d);r.appendChild(t);
    r.addEventListener('click',()=>go(i+1));
    r.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')go(i+1);});
    mtl.appendChild(r);
  });
}

function buildCd(){
  cdrow.innerHTML='';
  SD.forEach((_,i)=>{const d=document.createElement('div');d.className='cdot';d.id='cdt'+(i+1);cdrow.appendChild(d);});
}

function buildFs(){
  fstrip.innerHTML='';
  SD.forEach((_,i)=>{
    const seg=document.createElement('div');seg.className='fsseg';seg.id='fss'+(i+1);
    seg.setAttribute('role','button');seg.setAttribute('tabindex','0');
    const tr=document.createElement('div');tr.className='fstr';
    const fl=document.createElement('div');fl.className='fsfl';fl.id='fsf'+(i+1);
    tr.appendChild(fl);
    const lb=document.createElement('div');lb.className='fslbl';lb.textContent=String(i+1).padStart(2,'0')+' '+LBLS[i];
    seg.appendChild(tr);seg.appendChild(lb);
    seg.addEventListener('click',()=>go(i+1));
    seg.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')go(i+1);});
    fstrip.appendChild(seg);
  });
}

function preload(){
  let n=0;
  SD.forEach(s=>{const img=new Image();img.onload=img.onerror=()=>{n++;if(n===SD.length)onReady();};img.src=s.img;});
  setTimeout(()=>{if(!loaded)onReady();},3000);
}

function onReady(){
  if(loaded)return;loaded=true;
  document.getElementById('sldr').classList.add('off');
  SD.forEach((s,i)=>{
    const img=document.createElement('img');
    img.className='simg';img.id='si'+(i+1);img.src=s.img;img.alt=LBLS[i];img.draggable=false;
    // insert before chips (chips are last children of sa)
    sa.insertBefore(img,sa.querySelector('.chip'));
  });
  apply(1,true);
}

// ══════════════════════════
// NAVIGATION
// ══════════════════════════
function go(n){
  if(n===cur)return;
  stopScr();cancelPg();
  const p=cur;cur=n;
  trans(p,n);
}

function trans(p,n){
  const acc=ACC[n-1];
  hideChips();
  const pImg=document.getElementById('si'+p);
  if(pImg){pImg.style.transition='opacity .15s,transform .15s';pImg.style.opacity='.35';pImg.style.transform='translateY(-5px)';}
  setTimeout(()=>{
    if(pImg){pImg.style.opacity='0';pImg.style.transform='translateY(0)';pImg.className='simg';}
    const nImg=document.getElementById('si'+n);
    if(nImg){
      nImg.style.cssText='opacity:0;transform:translateY(7px);transition:none;';
      nImg.className='simg';
      requestAnimationFrame(()=>{nImg.style.transition='opacity .25s,transform .25s';nImg.style.opacity='1';nImg.style.transform='translateY(0)';nImg.className='simg on';});
    }
    setUrl(n);setWash(acc);setOrb(n,acc);setTl(n,acc);setCd(n,acc);setPanel(n,acc);setFs(n,acc);
    drawConn();
    setTimeout(()=>showChips(n,acc),260);
    rzone.classList.remove('vis');
    startPg(n);
  },150);
}

function apply(n,instant){
  cur=n;const acc=ACC[n-1];
  const img=document.getElementById('si'+n);
  if(img){img.className='simg on';img.style.opacity='1';}
  setUrl(n,true);setWash(acc);setOrb(n,acc);setTl(n,acc);setCd(n,acc);setPanel(n,acc);setFs(n,acc);
  setTimeout(()=>{showChips(n,acc);drawConn();},100);
  startPg(n);
}

// ══════════════════════════
// VISUAL HELPERS
// ══════════════════════════
function h(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function setWash(acc){wash.style.background=`radial-gradient(ellipse 800px 500px at center,${h(acc,.11)} 0%,transparent 68%)`;}

function setOrb(n,acc){
  orEl.setAttribute('stroke',acc);orEl.style.opacity='.3';
  arcEl.setAttribute('stroke',acc);
  const p=(n/7)*CIRC56;
  arcEl.style.transition='stroke-dasharray .6s cubic-bezier(.22,1,.36,1)';
  arcEl.setAttribute('stroke-dasharray',p+' '+(CIRC56-p));
  orbInner.classList.add('fd');
  setTimeout(()=>{oc.textContent=String(n).padStart(2,'0')+' / 07';oc.style.color=acc;on.textContent=SD[n-1].ol;orbInner.classList.remove('fd');},150);
}

function setTl(n,acc){
  for(let i=1;i<=7;i++){
    const d=document.getElementById('tld'+i);if(!d)continue;
    if(i<n){d.style.background=ACC[i-1];d.style.boxShadow='';}
    else if(i===n){d.style.background=acc;d.style.boxShadow=`0 0 0 3px white,0 0 0 5px ${h(acc,.3)}`;}
    else{d.style.background='#D0D8F0';d.style.boxShadow='';}
  }
}

function setCd(n,acc){
  for(let i=1;i<=7;i++){
    const d=document.getElementById('cdt'+i);if(!d)continue;
    if(i<n)d.style.background=h(ACC[i-1],.5);
    else if(i===n)d.style.background=acc;
    else d.style.background='rgba(255,255,255,.15)';
  }
}

function setUrl(n,instant){
  if(instant){utxt.textContent=URLS[n-1];return;}
  utxt.classList.add('fd');setTimeout(()=>{utxt.textContent=URLS[n-1];utxt.classList.remove('fd');},170);
}

function setPanel(n,acc){
  pi.classList.add('exit');
  setTimeout(()=>{
    const s=SD[n-1];
    pi.innerHTML=`<div class="panel-body"><div class="panel-left"><div class="ptag" style="background:${h(acc,.12)};border:1px solid ${h(acc,.26)};color:${acc}">STEP ${String(n).padStart(2,'0')} / 07 · ${LBLS[n-1]}</div><div class="pname">${s.nm}</div><div class="pins">${s.ins.map(ins=>`<div class="pin"><span class="pic" style="color:${acc}">${IC[ins.ic]||''}</span><span class="pit">${ins.tx}</span></div>`).join('')}</div></div><div class="panel-right"><div class="pql">AGENT IS THINKING</div><div class="pqt" style="border-left-color:${acc}">"${s.qt}"</div></div></div>`;
    pi.className='pi e0';requestAnimationFrame(()=>pi.className='pi ein');
  },150);
}

function setFs(n,acc){
  for(let i=1;i<=7;i++){
    const fl=document.getElementById('fsf'+i);
    const lb=document.querySelector('#fss'+(i)+' .fslbl');
    if(!fl)continue;
    if(i<n){fl.style.width='100%';fl.style.background=h(ACC[i-1],.65);}
    else if(i===n){fl.style.width='0%';fl.style.background=acc;}
    else{fl.style.width='0%';}
    if(lb)lb.style.color=(i===n?acc:i<n?h(ACC[i-1],.75):'#8A94B8');
  }
}

// ══════════════════════════
// CHIPS
// ══════════════════════════
function hideChips(){CHIPS.forEach(c=>c.classList.remove('vis'));}
function showChips(n,acc){
  const ch=SD[n-1].ch;
  CHIPS.forEach((el,i)=>{
    const c=ch[i];if(!c)return;
    el.style.border=`1px solid ${h(acc,.32)}`;
    el.innerHTML=`<div class="chtop"><div class="chd" style="background:${acc}"></div><span class="chlbl">${c.lbl}</span></div><div class="chcap">${c.cap}</div>`;
    setTimeout(()=>el.classList.add('vis'),i*70);
  });
}

// ══════════════════════════
// PROGRESS  (hover-aware, drives navigation)
// ══════════════════════════
function startPg(n){
  cancelPg();
  const acc=ACC[n-1];const dur=DURS[n-1];
  pgf.style.cssText=`width:0%;transition:none;background:${acc}`;
  const ff=document.getElementById('fsf'+n);if(ff){ff.style.background=acc;}
  let elapsed=0,last=null;
  const tick=now=>{
    if(last!==null&&!hovering)elapsed+=now-last;
    last=now;
    const p=Math.min(elapsed/dur*100,100);
    pgf.style.width=p+'%';
    if(ff)ff.style.width=p+'%';
    if(p<100){pgRaf=requestAnimationFrame(tick);}
    else{if(n<7)go(n+1);else showReplay();}
  };
  pgRaf=requestAnimationFrame(tick);
  setTimeout(()=>startScroll(n),800);
}
function cancelPg(){if(pgRaf){cancelAnimationFrame(pgRaf);pgRaf=null;}pgf.style.width='0%';}

// ══════════════════════════
// IMAGE AUTO-SCROLL
// ══════════════════════════
function stopScr(){if(scrRaf){cancelAnimationFrame(scrRaf);scrRaf=null;}}
function startScroll(n){
  stopScr();
  const img=document.getElementById('si'+n);if(!img)return;
  const doIt=()=>{
    const aH=sa.offsetHeight;
    const iH=img.naturalHeight>0?img.offsetWidth*(img.naturalHeight/img.naturalWidth):0;
    if(iH<=aH+30){img.style.transform='translateY(0)';return;}
    const dist=iH-aH;
    let acc2=0,last=null;
    const tick=now=>{
      if(!last)last=now;
      if(!hovering)acc2+=now-last;
      last=now;
      const mv=Math.min(acc2/1000*14,dist);
      img.style.transform=`translateY(${-mv}px)`;
      if(mv<dist)scrRaf=requestAnimationFrame(tick);
    };
    scrRaf=requestAnimationFrame(tick);
  };
  if(img.complete&&img.naturalWidth>0)doIt();
  else img.addEventListener('load',doIt,{once:true});
}

// ══════════════════════════
// CONNECTOR LINE
// ══════════════════════════
function drawConn(){
  connSvg.innerHTML='';
  try{
    const gR=document.getElementById('sgrid').getBoundingClientRect();
    const oR=document.getElementById('orbWrap').getBoundingClientRect();
    const lR=document.querySelector('.lid').getBoundingClientRect();
    const x1=oR.right-gR.left,x2=lR.left-gR.left+6;
    const y=oR.top+oR.height/2-gR.top;
    if(x2<=x1+2)return;
    connSvg.innerHTML=`<defs><style>@keyframes df{to{stroke-dashoffset:-14}}</style></defs><line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${ACC[cur-1]}" stroke-opacity=".42" stroke-width="1.5" stroke-dasharray="8 6" stroke-linecap="round" style="animation:df .8s linear infinite"/>`;
  }catch(e){}
}

// ══════════════════════════
// REPLAY
// ══════════════════════════
function showReplay(){
  rzone.classList.add('vis');
  if(rcRaf)cancelAnimationFrame(rcRaf);
  const circ=163.4;let t0=null;
  rf.style.strokeDashoffset=circ+'';
  const tick=now=>{
    if(!t0)t0=now;
    const p=Math.min((now-t0)/5000,1);
    rf.style.strokeDashoffset=(circ*(1-p))+'';
    if(p<1)rcRaf=requestAnimationFrame(tick);else replay();
  };
  rcRaf=requestAnimationFrame(tick);
}

function replay(){
  if(rcRaf){cancelAnimationFrame(rcRaf);rcRaf=null;}
  rzone.classList.remove('vis');
  clearA();cancelPg();stopScr();hideChips();
  document.querySelectorAll('.simg').forEach(img=>{img.className='simg';img.style.cssText='opacity:0;transform:translateY(0)';});
  cur=1;
  setTimeout(()=>{apply(1,true);schedA();},180);
}

document.addEventListener('DOMContentLoaded',init);
</script>
